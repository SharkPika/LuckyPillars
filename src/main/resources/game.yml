# 游戏基础配置
game:
  name: "SkyLuckyPillar"
  map: "world"
  min-players: 2
  countdown: 10
  game-timeout: 1800
  item-countdown: 5

# 柱子配置
pillars:
  # 柱子位置列表（可使用 /pillar setup add <id> <height> 添加）
  locations:
    -

  default-platform-size: 1
  default-platform-material: "BEDROCK"
  default-height: 70

# 物品配置
items:
  ban-list:
    - "BARRIER"

# 事件系统配置
events:
  cooldown: 120
  first-event-delay: 60

  monster-frenzy:
    enabled: true
    duration: 30
    monsters-per-player: 6
    monster-types:
      - "ZOMBIE"
      - "SKELETON"
      - "SPIDER"
      - "CREEPER"

  arrow-rain:
    enabled: true
    duration: 20
    arrow-chance: 0.3
    arrow-speed: 1.0

  lava-rise:
    enabled: true
    duration: 40
    rise-speed: 1
    max-height: 100

  block-decay:
    enabled: true
    duration: 30
    decay-chance: 0.05
    exclude-materials:
      - "BEDROCK"
      - "OBSIDIAN"

  supply-drop:
    enabled: true
    duration: 5
    drop-count: 3
    items-per-drop: 5

  buff:
    enabled: true
    duration: 15

  tnt-rain:
    enabled: true
    duration: 15
    spawn-chance: 0.15

  darkness:
    enabled: true
    duration: 15

  shuffle:
    enabled: true

  treasure-rain:
    enabled: true
    duration: 15
    items-per-tick: 3

  border-shrink:
    enabled: true
    duration: 60
    initial-size: 200
    min-size: 30

# 游戏规则
rules:
  void-death-height: 0
  keep-inventory: false
  drop-items-on-death: true
  max-build-height: 256
  min-build-height: 0
  allow-block-break: true
  allow-block-place: true
  pvp-enabled: true
  friendly-fire: false
  hunger-enabled: true
  natural-regeneration: true
  fall-damage: true
  fire-damage: true

# 旁观配置
spectator:
  allow-flight: true
  allow-teleport: true
  restrict-to-game-area: true
  show-alive-players: true
